services:
  - type: web
    name: helperjobshub
    runtime: node
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_VERSION
        value: 22.12.0
      - key: HOST
        value: 0.0.0.0
      - key: NODE_OPTIONS
        value: --experimental-sqlite
